---
name: Statick

on: # NOLINT
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Statick
        uses: sscpac/statick-action@v0.9.2
        with:
          profile: self_check.yaml
          timings: true
          # user_paths: src/statick_tool/rsc
